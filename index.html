
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON RUN — Parkour Game</title>
  <!-- <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body> -->


       <!-- GAME CANVAS — all rendering happens here -->

  <canvas id="gameCanvas"></canvas>
<!-- 
 start screen overlay  -->
  <div id="startScreen" class="overlay">
    <div class="overlay-inner">
      <div class="logo-wrap">
        <span class="logo-accent">◈</span>
        <h1 class="logo-title">NEON<br /><span>RUN</span></h1>
        <span class="logo-accent">◈</span>
      </div>
      <p class="tagline">Push the limits. Beat the grid.</p>

      <div class="controls-hint">
        <div class="key-row">
          <kbd>←</kbd><kbd>→</kbd>
          <span>or</span>
          <kbd>A</kbd><kbd>D</kbd>
          <span>— Move</span>
        </div>
        <div class="key-row">
          <kbd>Space</kbd>
          <span>or</span>
          <kbd>W</kbd>
          <span>— Jump / Double Jump</span>
        </div>
      </div>

      <button id="startBtn" class="btn btn-primary">
        <span class="btn-text">START GAME</span>
        <span class="btn-glow"></span>
      </button>

      <p class="version-tag">v1.0 · NEON PARKOUR ENGINE</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       GAME OVER SCREEN OVERLAY
  ════════════════════════════════════════════ -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="overlay-inner">
      <div class="gameover-header">
        <div class="gameover-icon">✕</div>
        <h2 class="gameover-title">FLATLINED</h2>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">DISTANCE</span>
          <span class="stat-value" id="finalScore">0</span>
          <span class="stat-unit">m</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">COINS</span>
          <span class="stat-value" id="finalCoins">0</span>
          <span class="stat-unit">⬡</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">BEST</span>
          <span class="stat-value" id="bestScore">0</span>
          <span class="stat-unit">m</span>
        </div>
      </div>

      <div class="btn-group">
        <button id="restartBtn" class="btn btn-primary">
          <span class="btn-text">↺ RETRY</span>
          <span class="btn-glow"></span>
        </button>
        <button id="menuBtn" class="btn btn-secondary">
          <span class="btn-text">MENU</span>
        </button>
      </div>
    </div>
  </div>

 <!-- for viewing score  -->
  <div id="hud" class="hidden">
    <div class="hud-left">
      <div class="hud-item">
        <span class="hud-label">DIST</span>
        <span class="hud-value" id="hudScore">0<span class="hud-unit">m</span></span>
      </div>
      <div class="hud-item">
        <span class="hud-label">COINS</span>
        <span class="hud-value" id="hudCoins">0</span>
      </div>
    </div>
    <div class="hud-right">
      <div class="hud-item">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" id="hudLevel">1</span>
      </div>
      <div class="jump-pips" id="jumpPips">
        <span class="pip active" id="pip1"></span>
        <span class="pip active" id="pip2"></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
